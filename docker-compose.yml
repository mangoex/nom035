version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - nom035_data:/app/data
    environment:
      - PORT=8000
      - DATABASE_URL=sqlite:////app/data/nom035.db
      - SECRET_KEY=${SECRET_KEY}
    restart: always

volumes:
  nom035_data:
